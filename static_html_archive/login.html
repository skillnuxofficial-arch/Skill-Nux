<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillNux — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
:root{--cyan:#00C9C8;--purple:#7C3AED;--purple2:#9F67FF;--orange:#FF6B35;--dark:#0B0D1A;--darker:#070910;--card-dark:#12152A;--text-dark:#E8EAF6;--muted-dark:#8892B0;--white:#fff;--border-dark:rgba(0,201,200,0.15);--success:#22c55e;--error:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text-dark);min-height:100vh;display:flex;flex-direction:column}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 6%;background:rgba(11,13,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-dark)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-c{width:38px;height:38px;border-radius:50%;border:2px solid var(--purple);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;background:linear-gradient(135deg,rgba(0,201,200,0.2),rgba(124,58,237,0.2))}
.logo-c span{background:linear-gradient(135deg,var(--cyan),var(--purple2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-n{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--white)}
.logo-n em{font-style:normal;color:var(--cyan)}
.back-btn{padding:8px 18px;border-radius:8px;border:1.5px solid var(--border-dark);color:var(--muted-dark);font-size:13px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;transition:all .2s}
.back-btn:hover{border-color:var(--cyan);color:var(--cyan)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 6% 60px}
.login-wrap{width:100%;max-width:440px}
/* Toggle */
.toggle-wrap{display:flex;background:var(--card-dark);border:1px solid var(--border-dark);border-radius:14px;padding:4px;margin-bottom:28px}
.toggle-btn{flex:1;padding:12px;border-radius:10px;border:none;background:transparent;color:var(--muted-dark);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .3s}
.toggle-btn.active{background:linear-gradient(135deg,var(--cyan),var(--purple));color:var(--white)}
/* Card */
.card{background:var(--card-dark);border:1px solid var(--border-dark);border-radius:20px;padding:36px 32px}
.card-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--white);margin-bottom:6px}
.card-sub{font-size:13px;color:var(--muted-dark);margin-bottom:28px}
/* Form */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
label{font-size:12px;font-weight:600;color:var(--muted-dark);text-transform:uppercase;letter-spacing:.5px}
input{padding:12px 16px;border-radius:10px;border:1.5px solid var(--border-dark);background:rgba(255,255,255,0.04);color:var(--white);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;width:100%}
input:focus{border-color:var(--cyan);background:rgba(0,201,200,0.04)}
input::placeholder{color:var(--muted-dark)}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--orange),var(--purple));color:var(--white);font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;margin-top:8px;display:block}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,53,0.4)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.alert.show{display:block}
.alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
.alert-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22c55e}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted-dark);font-size:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border-dark)}
.bottom-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted-dark)}
.bottom-link a{color:var(--cyan);text-decoration:none;font-weight:600}
.bottom-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">
    <div class="logo-c"><span>SN</span></div>
    <span class="logo-n">Skill<em>Nux</em></span>
  </a>
  <a class="back-btn" href="index.html">← Home</a>
</nav>

<main>
  <div class="login-wrap">

    <!-- Toggle -->
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="studentTab" onclick="switchTab('student')">🎓 Student Login</button>
      <button class="toggle-btn" id="businessTab" onclick="switchTab('business')">🏢 Business Login</button>
    </div>

    <!-- Student Login -->
    <div id="studentForm">
      <div class="card">
        <div class="card-title">Welcome Back! 👋</div>
        <div class="card-sub">Login to your student account</div>
        <div class="alert alert-error" id="studentErr"></div>
        <div class="alert alert-success" id="studentSucc"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="s_email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="s_password" placeholder="Enter your password"/>
        </div>
        <button class="btn-primary" id="studentLoginBtn">Login as Student →</button>
        <div class="bottom-link" style="margin-top:16px">
          New student? <a href="register.html">Register here</a>
        </div>
      </div>
    </div>

    <!-- Business Login -->
    <div id="businessForm" style="display:none">
      <div class="card">
        <div class="card-title">Business Login 🏢</div>
        <div class="card-sub">Login to your business account</div>
        <div class="alert alert-error" id="businessErr"></div>
        <div class="alert alert-success" id="businessSucc"></div>
        <div class="form-group">
          <label>Business Email</label>
          <input type="email" id="b_email" placeholder="business@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="b_password" placeholder="Enter your password"/>
        </div>
        <button class="btn-primary" id="businessLoginBtn">Login as Business →</button>
        <div class="bottom-link" style="margin-top:16px">
          New business? <a href="business-register.html">Register here</a>
        </div>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SURL = 'https://mzcbakrhhwdfkhvptmer.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16Y2Jha3JoaHdkZmtodnB0bWVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzQzMzksImV4cCI6MjA5NDY1MDMzOX0.Opec2RvWcWorsIBDyo1MDSaeAgDf29J6X5pEeKXub68';
var sb = supabase.createClient(SURL, SKEY);

function switchTab(tab) {
  if(tab === 'student') {
    document.getElementById('studentForm').style.display = 'block';
    document.getElementById('businessForm').style.display = 'none';
    document.getElementById('studentTab').classList.add('active');
    document.getElementById('businessTab').classList.remove('active');
  } else {
    document.getElementById('studentForm').style.display = 'none';
    document.getElementById('businessForm').style.display = 'block';
    document.getElementById('businessTab').classList.add('active');
    document.getElementById('studentTab').classList.remove('active');
  }
}

// Student Login
document.getElementById('studentLoginBtn').onclick = async function() {
  var email = document.getElementById('s_email').value.trim();
  var password = document.getElementById('s_password').value;
  var err = document.getElementById('studentErr');
  var succ = document.getElementById('studentSucc');

  if(!email || !password) {
    err.textContent = '⚠️ Please enter email and password!';
    err.classList.add('show');
    setTimeout(function(){err.classList.remove('show');}, 3000);
    return;
  }

  var btn = document.getElementById('studentLoginBtn');
  btn.innerHTML = '<span class="loading"></span> Logging in...';
  btn.disabled = true;

  try {
    var res = await sb.from('students').select('*').eq('email', email).eq('password', password).single();
    if(res.error || !res.data) {
      err.textContent = '⚠️ Invalid email or password!';
      err.classList.add('show');
      setTimeout(function(){err.classList.remove('show');}, 3000);
      btn.innerHTML = 'Login as Student →';
      btn.disabled = false;
      return;
    }
    // Save student data
    localStorage.setItem('skillnux_user', JSON.stringify({type:'student', ...res.data}));
    succ.textContent = '✅ Login successful! Redirecting...';
    succ.classList.add('show');
    setTimeout(function(){
      window.location.href = 'student-dashboard.html';
    }, 1500);
  } catch(e) {
    err.textContent = '⚠️ Something went wrong. Try again!';
    err.classList.add('show');
    btn.innerHTML = 'Login as Student →';
    btn.disabled = false;
  }
};

// Business Login
document.getElementById('businessLoginBtn').onclick = async function() {
  var email = document.getElementById('b_email').value.trim();
  var password = document.getElementById('b_password').value;
  var err = document.getElementById('businessErr');
  var succ = document.getElementById('businessSucc');

  if(!email || !password) {
    err.textContent = '⚠️ Please enter email and password!';
    err.classList.add('show');
    setTimeout(function(){err.classList.remove('show');}, 3000);
    return;
  }

  var btn = document.getElementById('businessLoginBtn');
  btn.innerHTML = '<span class="loading"></span> Logging in...';
  btn.disabled = true;

  try {
    var res = await sb.from('businesses').select('*').eq('email', email).eq('password', password).single();
    if(res.error || !res.data) {
      err.textContent = '⚠️ Invalid email or password!';
      err.classList.add('show');
      setTimeout(function(){err.classList.remove('show');}, 3000);
      btn.innerHTML = 'Login as Business →';
      btn.disabled = false;
      return;
    }
    localStorage.setItem('skillnux_user', JSON.stringify({type:'business', ...res.data}));
    succ.textContent = '✅ Login successful! Redirecting...';
    succ.classList.add('show');
    setTimeout(function(){
      window.location.href = 'business-dashboard.html';
    }, 1500);
  } catch(e) {
    err.textContent = '⚠️ Something went wrong. Try again!';
    err.classList.add('show');
    btn.innerHTML = 'Login as Business →';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
